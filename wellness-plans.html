<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equine Vital — Wellness Plans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { forest: '#123524', moss: '#4f6f52', sage: '#7d9b72', cream: '#f8f4e8', olive: '#556b2f' } } } };
    </script>
</head>

<body class="flex min-h-screen flex-col bg-cream text-slate-800">
    <div id="header-container"></div>

    <main class="flex-1">
        <section class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
            <div class="rounded-[2rem] border border-green-900/10 bg-white p-8 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-[0.3em] text-moss">More</p>
                <h1 class="mt-2 text-3xl font-semibold text-forest sm:text-4xl">Wellness plans</h1>
                <p class="mt-4 max-w-3xl text-base leading-7 text-slate-600">Structured wellness programs created to
                    support recovery, maintenance, and long-term comfort for your horse.</p>
            </div>
        </section>
    </main>

    <footer class="border-t border-green-900/10 bg-white/70">
        <div
            class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-8 text-sm text-slate-600 sm:px-6 md:flex-row md:items-center md:justify-between lg:px-8">
            <p>© 2026 Equine Vital Horse Health</p>
        </div>
    </footer>

    <script src="scripts/main.js"></script>
    <script>
        async function loadSection(containerId, filePath) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`Failed to load ${filePath}`);
            container.innerHTML = await response.text();
        }

        Promise.all([loadSection('header-container', 'sections/header.html')])
            .then(() => {
                if (window.initMobileMenu) window.initMobileMenu();
            })
            .catch(console.error);
    </script>
</body>

</html>
