<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equine Vital — Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { forest: '#123524', moss: '#4f6f52', sage: '#7d9b72', cream: '#f8f4e8', olive: '#556b2f' } } } };
    </script>
</head>

<body class="min-h-screen bg-cream text-slate-800">
    <div id="header-container"></div>

    <main>
        <section class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
            <div class="rounded-2xl border border-green-900/10 bg-white p-8 shadow-sm">
                <h1 class="text-2xl font-semibold text-forest">Get in touch</h1>
                <p class="mt-2 text-sm text-slate-600">Questions about products, team visits, or partnerships? Send us a
                    message.</p>

                <form class="mt-6 grid gap-4 sm:grid-cols-2">
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Name</label>
                        <input type="text" class="w-full rounded-md border border-green-200 px-3 py-2"
                            placeholder="Your name" />
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
                        <input type="email" class="w-full rounded-md border border-green-200 px-3 py-2"
                            placeholder="you@example.com" />
                    </div>
                    <div class="sm:col-span-2">
                        <label class="mb-1 block text-sm font-medium text-slate-700">Message</label>
                        <textarea rows="5" class="w-full rounded-md border border-green-200 px-3 py-2"
                            placeholder="How can we help?"></textarea>
                    </div>
                    <div class="sm:col-span-2 flex items-center justify-end">
                        <button type="submit"
                            class="rounded-full bg-forest px-6 py-2 text-sm font-semibold text-white hover:bg-moss">Send
                            message</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="border-t border-green-900/10 bg-white/70">
        <div
            class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-8 text-sm text-slate-600 sm:px-6 md:flex-row md:items-center md:justify-between lg:px-8">
            <p>© 2026 Equine Vital Horse Health</p>
        </div>
    </footer>

    <script src="scripts/main.js"></script>
    <script>
        async function loadSection(containerId, filePath) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`Failed to load ${filePath}`);
            container.innerHTML = await response.text();
        }

        Promise.all([
            loadSection('header-container', 'sections/header.html')
        ])
            .then(() => {
                if (window.initMobileMenu) window.initMobileMenu();
            })
            .catch(console.error);
    </script>
</body>

</html>
