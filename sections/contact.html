<section id="contact-form" class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="rounded-2xl border border-green-900/10 bg-white p-8 shadow-sm">
    <h2 class="text-2xl font-semibold text-forest">Get in touch</h2>
    <p class="mt-2 text-sm text-slate-600">Questions about products, team visits, or partnerships? Send us a message.</p>

    <form class="mt-6 grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Name</label>
        <input type="text" class="w-full rounded-md border border-green-200 px-3 py-2" placeholder="Your name" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input type="email" class="w-full rounded-md border border-green-200 px-3 py-2" placeholder="you@example.com" />
      </div>

      <div class="sm:col-span-2">
        <label class="mb-1 block text-sm font-medium text-slate-700">Message</label>
        <textarea rows="5" class="w-full rounded-md border border-green-200 px-3 py-2" placeholder="How can we help?"></textarea>
      </div>

      <div class="sm:col-span-2 flex items-center justify-end">
        <button type="submit" class="rounded-full bg-forest px-6 py-2 text-sm font-semibold text-white hover:bg-moss">Send message</button>
      </div>
    </form>
  </div>
</section>
